<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page 11 — Memory Wall | Shristi's 24th 🌸</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Lato:wght@300;400&display=swap"
      rel="stylesheet" />
    <style>
    :root{--rose:#e8698a;--deep:#c0395a;--gold:#f7c873;--dark:#1a0a10;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--dark);min-height:100vh;font-family:'Lato',sans-serif;color:white;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;}
    
    /* Theme Effects */
    #stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
    .star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d) ease-in-out infinite alternate;}
    @keyframes twinkle{from{opacity:0.1}to{opacity:0.95}}
    #petals{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:hidden;}
    .petal{position:absolute;top:-40px;animation:fall linear infinite;pointer-events:none;}
    @keyframes fall{0%{transform:translateY(-50px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

    .page-header{position:relative;z-index:2;text-align:center;padding:3rem 2rem 1rem;}
    .page-num{font-family:'Dancing Script',cursive;font-size:1.1rem;color:var(--gold);letter-spacing:2px;}
    .page-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,7vw,4rem);background:linear-gradient(135deg,#f8c8d8,var(--rose),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

    /* Polaroid Memory Wall */
    .wall-container {
      position: relative; z-index: 2;
      max-width: 900px; width: 95%;
      margin: 2rem auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem; padding: 1rem;
    }

    .polaroid {
      background: white; padding: 10px 10px 30px 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer; position: relative;
    }

    /* Random Rotation for physical look */
    .polaroid:nth-child(odd) { transform: rotate(-2deg); }
    .polaroid:nth-child(even) { transform: rotate(3deg); }
    .polaroid:nth-child(3n) { transform: rotate(-4deg); }

    .polaroid:hover {
      transform: scale(1.1) rotate(0deg) translateY(-10px);
      z-index: 10;
      box-shadow: 0 15px 45px rgba(232,105,138,0.4);
    }

    .polaroid img {
      width: 100%; height: 200px;
      object-fit: cover; display: block;
      filter: sepia(0.2);
    }

    .polaroid p {
      font-family: 'Dancing Script', cursive;
      color: #333; text-align: center;
      padding-top: 15px; font-size: 1.2rem;
    }

    /* Lightbox Overlay */
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 1000;
      display: none; justify-content: center; align-items: center;
      backdrop-filter: blur(10px); cursor: pointer;
    }
    #overlay img {
      max-width: 90%; max-height: 80%;
      border: 10px solid white; border-bottom: 50px solid white;
      box-shadow: 0 0 50px rgba(232,105,138,0.5);
    }

    .nav-row{position:relative;z-index:2;display:flex;gap:1rem;justify-content:center;padding:2rem 1rem 5rem;}
    .nav-btn{padding:0.8rem 2rem;border-radius:50px;font-family:'Dancing Script',cursive;font-size:1.2rem;text-decoration:none;transition:0.2s;border:none;cursor:pointer;}
    .nav-btn.home{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);}
    .nav-btn.next{background:linear-gradient(135deg,var(--rose),var(--deep));color:white;}
  </style>
  </head>
  <body>

    <div id="stars"></div>
    <div id="petals"></div>
    <div id="overlay" onclick="this.style.display='none'"><img src
        id="overlayImg" /></div>

    <audio id="bgm" loop><source src="Die_with_a_smile.mp3"
        type="audio/mpeg"></audio>

    <header class="page-header">
      <p class="page-num">✨ Surprise #11 of 24 ✨</p>
      <h1 class="page-title">Gallery of Us 🖼️</h1>
    </header>

    <div class="wall-container">
      <div class="polaroid" style="grid-column: span 2;"
        onclick="openLightbox('images/i12.jpg')">
        <img src="images/i12.jpg" alt="Memory" />
        <p>Kissed me 💗</p>
      </div>

      <div class="polaroid" onclick="openLightbox('images/i13.jpg')">
        <img src="images/i13.jpg" alt="Memory" />
        <p>Hugged you 🌸</p>
      </div>

      <div class="polaroid" onclick="openLightbox('images/i14.jpg')">
        <img src="images/i14.jpg" alt="Memory" />
        <p>Aaiya chimaatyo ✨</p>
      </div>
      <div class="polaroid" onclick="openLightbox('images/i15.jpg')">
        <img src="images/i15.jpg" alt="Memory" />
        <p>Always together 🌺</p>
      </div>

      <div class="polaroid" onclick="openLightbox('images/i16.jpeg')">
        <img src="images/i16.jpeg" alt="Memory" />
        <p>Pure perfection 💖</p>
      </div>
    </div>

    <div class="nav-row">
      <a href="index.html" class="nav-btn home">🏠 Home</a>
      <a href="page12.html" class="nav-btn next">Next Surprise → 🌸</a>
    </div>

    <script>
  function openLightbox(src) {
    document.getElementById('overlayImg').src = src;
    document.getElementById('overlay').style.display = 'flex';
  }

  (function(){
    // Stars & Petals logic (from previous pages)
    var se=document.getElementById('stars');
    for(var i=0;i<100;i++){
      var s=document.createElement('div'); s.className='star';
      var sz=(Math.random()*2+0.5);
      s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;--d:'+(Math.random()*3+1)+'s;';
      se.appendChild(s);
    }
    var pe=document.getElementById('petals');
    var emojis=['🌸','✨','💗','🌹'];
    for(var j=0;j<15;j++){
      var p=document.createElement('div'); p.className='petal';
      p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      p.style.cssText='left:'+(Math.random()*100)+'%;animation-duration:'+(Math.random()*8+5)+'s;animation-delay:'+(Math.random()*5)+'s;';
      pe.appendChild(p);
    }

    // Audio Trigger
    var audio=document.getElementById('bgm'), playing=false;
    document.addEventListener('click',function(){
      if(!playing){ audio.play().catch(()=>{}); playing=true; }
    },{once:true});
  })();
</script>

  </body>
</html>
