<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy 24th Birthday, Shristi 🌸</title>
    <style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a10;}
iframe{width:100%;height:100%;border:none;display:block;}
#mbtn{
  position:fixed;
  bottom:18px;
  right:18px;
  z-index:9999;
  width:44px;
  height:44px;
  border-radius:50%;
  background:linear-gradient(135deg,#e8698a,#c0395a);
  border:none;
  color:white;
  font-size:1.1rem;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(232,105,138,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform 0.2s,box-shadow 0.2s;
}
#mbtn:hover{transform:scale(1.12);box-shadow:0 6px 28px rgba(232,105,138,0.9);}
</style>
  </head>
  <body>

    <iframe id="frame" src="home.html"></iframe>
    <audio id="bgm" loop><source src="Die_with_a_smile.mp3"
        type="audio/mpeg"></audio>
    <button id="mbtn">&#9654;</button>

    <script>
var audio = document.getElementById('bgm');
var btn   = document.getElementById('mbtn');
var frame = document.getElementById('frame');
var playing = false;

// Try autoplay immediately
audio.play().then(function(){
  btn.innerHTML = '&#9646;&#9646;';
  playing = true;
}).catch(function(){
  // autoplay blocked — will start on first click
});

// Start on first interaction if autoplay was blocked
document.addEventListener('click', function start(){
  if(!playing){
    audio.play().then(function(){
      btn.innerHTML = '&#9646;&#9646;';
      playing = true;
    }).catch(function(){});
  }
  document.removeEventListener('click', start);
});

// Toggle button
btn.addEventListener('click', function(e){
  e.stopPropagation();
  if(playing){
    audio.pause();
    btn.innerHTML = '&#9654;';
    playing = false;
  } else {
    audio.play();
    btn.innerHTML = '&#9646;&#9646;';
    playing = true;
  }
});

// When iframe loads a new page: hide its old music bar, intercept link clicks
frame.addEventListener('load', function(){
  try {
    var doc = frame.contentDocument || frame.contentWindow.document;

    // Hide any leftover music bars inside pages
    doc.querySelectorAll('.music-bar').forEach(function(el){
      el.style.display = 'none';
    });

    // Intercept all link clicks so navigation stays in iframe (music never stops)
    doc.addEventListener('click', function(e){
      var a = e.target.closest('a');
      if(!a) return;
      var href = a.getAttribute('href');
      if(!href || href.charAt(0)==='#' || a.target) return;
      e.preventDefault();
      var base = frame.src.substring(0, frame.src.lastIndexOf('/') + 1);
      frame.src = href.indexOf('http') === 0 ? href : base + href;
    });
  } catch(err){}
});
</script>
  </body>
</html>
